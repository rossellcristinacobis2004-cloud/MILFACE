<!DOCTYPE html>
<html>
<head>
    <title>MILFACE - Acceso Restringido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    
    <style>
        /* Contenedor principal de ParticlesJS */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            background-image: url("");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 50% 50%;
            z-index: -1; /* Manda el fondo atrás */
        }

        .login-box {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            background: rgba(7, 11, 20, 0.65);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.15);
            text-align: center;
            z-index: 10; /* Caja de login enfrente */
        }

        .lock-icon {
            font-size: 4rem;
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            margin-bottom: 20px;
        }

        .cyber-input-group {
            position: relative;
            margin-bottom: 30px;
            margin-top: 30px;
        }

        .cyber-input-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: var(--neon-blue);
        }

        .cyber-input-group input {
            width: 100%;
            background: rgba(13, 20, 35, 0.9);
            border: 1px solid var(--neon-blue);
            padding: 12px 15px 12px 45px;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .cyber-input-group input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            background: rgba(0, 242, 254, 0.05);
        }

        .alert-error {
            background: rgba(255, 42, 95, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center" style="height: 100vh; overflow: hidden; margin: 0; background-color: #070b14;">

    <!-- Div donde vivirá la animación de las partículas -->
    <div id="particles-js"></div>

    <div class="login-box">
        <i class="bi bi-shield-lock lock-icon"></i>
        <h3 style="font-family: 'Orbitron', sans-serif; font-weight: 700;">ACCESO RESTRINGIDO</h3>
        <p class="text-secondary small mb-2">SISTEMA DE CONTROL MILITAR MILFACE</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                <div class="alert-error mt-3">
                    <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i> {{ msg }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="cyber-input-group">
                <i class="bi bi-key-fill"></i>
                <input type="password" name="llave" id="llave" placeholder="LLAVE MAESTRA" required autocomplete="off" autofocus>
            </div>
            
            <button type="submit" class="btn-neon w-100 fs-5 pb-2 pt-2">
                <i class="bi bi-unlock-fill me-2"></i> INICIAR SESIÓN
            </button>
        </form>
    </div>

    <!-- Scripts de Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 80,
                    "density": { "enable": true, "value_area": 800 }
                },
                "color": { "value": "#00f2fe" },
                "shape": { "type": "circle" },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": { "enable": false }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00f2fe",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": { "enable": false }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
